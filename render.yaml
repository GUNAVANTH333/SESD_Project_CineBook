services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: cinebook-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false   # Set manually in Render dashboard
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: SEAT_LOCK_TTL_MINUTES
        value: 10
      - key: ADMIN_REGISTRATION_KEY
        sync: false

  # ── Frontend Static Site ─────────────────────────────────────────────────────
  - type: web
    name: cinebook-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false   # Set to your cinebook-api Render URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
